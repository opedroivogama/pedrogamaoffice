building_name = "Escritório Digital — Pedro Gama"

# Reset 2026-06-07: voltamos pra UM andar único.
#
# Operacional é o andar onde aparece tudo que o Claude Code está executando
# agora — sessões reais via hooks. É o que a fork upstream sempre soube fazer
# bem. Tudo que era placeholder/decorativo foi removido.
#
# Convenção de source_id (campo `repos`): aceita o basename do dir (com
# espaço ou kebab) e a forma "C--Users-..." que o hook Claude Code costuma
# emitir.  Múltiplas variantes ficam aqui pra cobrir as diferentes formas que
# o hook pode normalizar o nome.
#
# Próximos andares (Comercial, Clientes, Diretoria, Mídia Paga, etc.) voltam
# UM POR VEZ, quando o bridge correspondente estiver produzindo eventos de
# verdade — não como casca vazia. Os scripts em `scripts/bridges/` ficam
# preservados pra reativação.

[[floors]]
name = "Operacional"
floor_number = 5
accent = "#B8972A"  # JP Gold Primary
icon = "💻"
repos = [
  "escritorio online",                                          # basename real do dir com .git
  "escritorio-online",                                          # variante kebab
  "C--Users-Pedro-Desktop-escritorio-online",                   # project_name estilo Claude Code
  "C--Users-Pedro-Desktop-escritorio-online-backend",
  "C--Users-Pedro-Desktop-escritorio-online-frontend",
]
